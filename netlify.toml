[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Serve static HTML pages from public/ folder
[[redirects]]
  from = "/plans"
  to = "/plans.html"
  status = 200

[[redirects]]
  from = "/payment"
  to = "/payment.html"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
